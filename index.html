<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d0d">
    <title>Heist Run — Endless Thief Runner</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: "Segoe UI", system-ui, sans-serif;
            touch-action: none;
        }
        #gameWrap {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            display: block;
            box-shadow: 0 8px 40px rgba(0,0,0,0.85);
            border-radius: 16px;
            width: 430px;
            height: 760px;
            max-height: 100vh;
            max-width: 100vw;
            object-fit: contain;
            image-rendering: auto;
        }
        #touchControls {
            display: none;
            width: 100%;
            max-width: 430px;
            padding: 8px 12px 16px;
            gap: 8px;
        }
        @media (pointer: coarse), (max-width: 600px) {
            #touchControls { display: grid; grid-template-columns: 1fr 1fr 1fr; }
            body { align-items: flex-end; padding-bottom: env(safe-area-inset-bottom); }
        }
        .tbtn {
            border: none;
            border-radius: 14px;
            padding: 16px 8px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        .tbtn-left, .tbtn-right { background: linear-gradient(180deg, #334155, #1e293b); }
        .tbtn-jump { background: linear-gradient(180deg, #16a34a, #15803d); grid-column: span 1; }
        .tbtn-dash { background: linear-gradient(180deg, #0891b2, #0e7490); }
        .tbtn:active { transform: scale(0.95); opacity: 0.9; }
        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.75);
            border-radius: 16px;
            z-index: 10;
            padding: 16px;
        }
        #overlay.hidden { display: none; }
        .panel {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px 20px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            border: 1px solid #334155;
        }
        .panel h1 { color: #ff3838; margin: 0 0 16px; font-size: 32px; }
        .stats { display: grid; gap: 8px; margin-bottom: 16px; text-align: left; }
        .stats div {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 14px;
            padding: 6px 0;
            border-bottom: 1px solid #334155;
        }
        .stats strong { color: #fff; }
        .btn {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary { background: #22c55e; color: #fff; }
        .btn-gold { background: #f59e0b; color: #1e293b; }
        .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #475569; }
        .btn:active { opacity: 0.85; }
    </style>
</head>
<body>

<div id="gameWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay" class="hidden"></div>
    <div id="touchControls">
        <button class="tbtn tbtn-left" data-action="left">◀ LEFT</button>
        <button class="tbtn tbtn-jump" data-action="jump">▲ JUMP</button>
        <button class="tbtn tbtn-right" data-action="right">RIGHT ▶</button>
        <button class="tbtn tbtn-dash" data-action="dash" style="grid-column: span 3;">⚡ DASH</button>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
